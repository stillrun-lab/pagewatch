name: Pagewatch — content check

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pagewatch-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pagewatch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python pagewatch.py

      - name: Persist snapshots
        run: |
          git config user.name "pagewatch-bot"
          git config user.email "pagewatch@users.noreply.github.com"
          if [ -f state/snapshots.json ]; then
            git add -f state/snapshots.json
            if ! git diff --staged --quiet; then
              git commit -m "state: update page snapshots"
              git push
            fi
          fi
